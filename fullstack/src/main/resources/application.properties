# 1. Server Port
server.port=8080

# 2. Database Connection (SQL Server)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=serviceProduct;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 3. JPA / Hibernate Configuration
# Sử dụng Dialect chung cho SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Tự động cập nhật bảng nếu có thay đổi trong Entity
spring.jpa.hibernate.ddl-auto=update
spring.mvc.static-path-pattern=/images/**
spring.web.resources.static-locations=file:D:/LDPlayer/ServiceProduct/fullstack/uploads/
# Hiển thị câu lệnh SQL trên console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true